apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Le manifest officiel, consommé directement depuis la release GitHub
resources:
  - https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.8.1/components.yaml

# Patch : les kubelets kubeadm ont des certs auto-signés, on demande
# à metrics-server de les accepter (compromis standard, à documenter)
patches:
  - target:
      kind: Deployment
      name: metrics-server
      namespace: kube-system
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kubelet-insecure-tls
