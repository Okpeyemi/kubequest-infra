alloy:
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 300m, memory: 256Mi}
  configMap:
    content: |
      // 1. Découvrir tous les pods du cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // 2. Transformer les métadonnées Kubernetes en labels Loki propres
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      // 3. Suivre les logs de ces pods...
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      // 4. ...et les pousser vers Loki
      loki.write "default" {
        endpoint {
          url = "http://loki.logging.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  # Capteur de logs : sur TOUS les nœuds, taints compris
  tolerations: [{operator: Exists}]
