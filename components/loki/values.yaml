deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 168h        # 7 jours de logs
  compactor:
    retention_enabled: true       # sans ça, la rétention n'efface rien
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  nodeSelector: {node-role.kubernetes.io/monitoring: ""}
  tolerations: [{key: dedicated, value: monitoring, effect: NoSchedule}]
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 500m, memory: 512Mi}

# Tout l'attirail du mode distribué : coupé
read: {replicas: 0}
write: {replicas: 0}
backend: {replicas: 0}
gateway: {enabled: false}
chunksCache: {enabled: false}
resultsCache: {enabled: false}
lokiCanary: {enabled: false}
test: {enabled: false}
